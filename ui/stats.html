<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>原题机 · stats</title>
<style>
:root{--accent:#ff4d14; --accent-2:#ff6a14; --ink:#1d1d24; --mut:#8a8694; --line:#f0e0d4; --weak:#fff3ec}
*{box-sizing:border-box; margin:0; padding:0}
body{font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
     color:var(--ink); background:#fffdfb; padding:clamp(24px,4vw,56px)}
.wrap{max-width:880px; margin:0 auto}
h1{font-size:clamp(20px,2.4vw,28px); letter-spacing:-.02em}
h1 .sub{color:var(--mut); font-weight:400; font-size:.65em; margin-left:10px}
h2{font-size:clamp(14px,1.5vw,17px); margin:clamp(28px,4vw,44px) 0 14px; display:flex; align-items:baseline; gap:10px}
h2 .u{color:var(--mut); font-weight:400; font-size:12px}
.cards{display:flex; gap:14px; flex-wrap:wrap; margin-top:clamp(18px,2.5vw,28px)}
.card{background:var(--weak); border-radius:10px; padding:14px 22px 12px; min-width:140px}
.card .n{font-size:clamp(22px,2.6vw,30px); font-weight:700; letter-spacing:-.02em; font-variant-numeric:tabular-nums}
.card .l{color:var(--mut); font-size:12px}
.row{display:grid; grid-template-columns:78px 1fr auto; gap:12px; align-items:center; padding:3px 0; font-variant-numeric:tabular-nums}
.row .d{color:var(--mut); font-size:12px; text-align:right; white-space:nowrap}
.bar{height:16px; border-radius:4px; background:linear-gradient(90deg,var(--accent-2),var(--accent)); min-width:2px}
.bar.rr{background:#ffd9c4}
.barwrap{display:flex; gap:2px; align-items:center}
.row .v{font-size:12px; color:var(--mut); white-space:nowrap}
.row .v b{color:var(--ink)}
.hours{display:grid; grid-template-columns:repeat(24,1fr); gap:clamp(2px,.5vw,6px); align-items:end; height:140px; margin-top:8px}
.hcol{display:flex; flex-direction:column; justify-content:flex-end; align-items:stretch; height:100%; gap:0}
.hcol .hb{background:linear-gradient(180deg,var(--accent-2),var(--accent)); border-radius:3px 3px 0 0; min-height:1px}
.hlbl{display:grid; grid-template-columns:repeat(24,1fr); gap:clamp(2px,.5vw,6px); color:var(--mut); font-size:10px; text-align:center; margin-top:4px}
.hcount{display:grid; grid-template-columns:repeat(24,1fr); gap:clamp(2px,.5vw,6px); color:var(--mut); font-size:10px; text-align:center; margin-bottom:2px; font-variant-numeric:tabular-nums}
.empty{color:var(--mut); padding:20px 0}
footer{color:var(--mut); font-size:12px; margin-top:clamp(30px,4vw,50px); border-top:1.5px solid var(--line); padding-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <h1>原题机<span class="sub">usage · past 31 days</span></h1>
  <div class="cards" id="cards"></div>
  <h2>per day <span class="u">searches · <span style="color:#e8a17e">reranks</span> · est. cost</span></h2>
  <div id="days"></div>
  <h2>by UTC hour <span class="u">all queries, past 31 days</span></h2>
  <div id="hwrap"></div>
  <footer>counts and token totals only — query text is never recorded.</footer>
</div>
<script>
const $=s=>document.querySelector(s), esc=s=>String(s);
fetch("/api/stats").then(r=>r.json()).then(d=>{
  const t=d.total||{searches:0,reranks:0,cost:0};
  $("#cards").innerHTML=[["searches",t.searches],["reranks",t.reranks],["est. cost",`$${(t.cost||0).toFixed(2)}`]]
    .map(([l,n])=>`<div class="card"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
  if(!d.days.length){ $("#days").innerHTML=`<div class="empty">no queries yet.</div>`; $("#hwrap").innerHTML=`<div class="empty">—</div>`; return; }
  const mx=Math.max(...d.days.map(x=>x.searches+x.reranks),1);
  $("#days").innerHTML=d.days.map(x=>`<div class="row"><span class="d">${x.d.slice(5)}</span>
    <span class="barwrap"><span class="bar" style="width:${x.searches/mx*100}%"></span>${x.reranks?`<span class="bar rr" style="width:${x.reranks/mx*100}%"></span>`:""}</span>
    <span class="v"><b>${x.searches}</b>${x.reranks?` +${x.reranks}`:""} · $${x.cost.toFixed(3)}</span></div>`).join("");
  const hm=Math.max(...d.hours.map(x=>x.searches+x.reranks),1);
  $("#hwrap").innerHTML=`<div class="hcount">${d.hours.map(x=>`<span>${x.searches+x.reranks||""}</span>`).join("")}</div>
    <div class="hours">${d.hours.map(x=>`<div class="hcol"><div class="hb" style="height:${(x.searches+x.reranks)/hm*100}%"></div></div>`).join("")}</div>
    <div class="hlbl">${d.hours.map(x=>`<span>${x.h}</span>`).join("")}</div>`;
});
</script>
</body>
</html>
